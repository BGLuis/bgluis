name: Generate Galaga Space Shooter

on:
  schedule:
    - cron: "0 */12 * * *" # Roda automaticamente todos os dias à meia-noite
  workflow_dispatch: # Permite que você rode manualmente clicando no botão
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Generate Space Shooter Animation
        uses: czl9707/gh-space-shooter@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          output-path: galaga.gif
          no-amend: true

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add galaga.gif
          git commit -m "Atualiza animação do Galaga" || echo "Sem mudanças"
          git push
